<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacher Store | Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark-bg: #0a0f1d;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); }

        /* Navbar */
        nav { padding: 15px 8%; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); text-decoration: none; }

        /* Products */
        .container { padding: 40px 8%; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-buy { margin-top: 15px; padding: 12px 25px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; overflow-y: auto; }
        .modal-content {
            background: white; color: #1e293b; width: 90%; max-width: 450px;
            margin: 50px auto; padding: 30px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
        }
        .close-modal { position: absolute; left: 20px; top: 15px; font-size: 25px; cursor: pointer; }
        
        .alert-box { width: 100%; background: #fff4e5; border-right: 5px solid #ffa117; padding: 15px; margin: 20px 0; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .rip-container { width: 100%; background: #f1f5f9; padding: 20px; border-radius: 12px; border: 1px dashed #6366f1; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BACHER STORE</a>
</nav>

<div class="container">
    <div class="products-grid">
        <div class="card">
            <h3>IPTV 4K Ultra</h3>
            <p>10,000 قناة</p>
            <div style="font-size: 25px; font-weight: 900; color: var(--accent);">15$</div>
            <button class="btn-buy" onclick="openPayment('IPTV 4K Ultra', '15')">شراء الآن</button>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="payment-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3>تأكيد الطلب</h3>
        
        <div id="order-info"></div>

        <div class="alert-box">
            <i class="fas fa-exclamation-triangle"></i>
            <span>التسليم خلال 12 ساعة</span>
        </div>

        <div class="rip-container">
            <p style="margin-bottom: 10px;">رقم الـ RIP:</p>
            <strong style="font-size: 18px;">00799999004422427407</strong>
        </div>

        <form id="payment-form">
            <button type="submit" class="btn-buy" style="width: 100%;">تأكيد وإرسال للواتساب</button>
        </form>
    </div>
</div>

<script>
    function openPayment(productName, price) {
        const modal = document.getElementById('payment-modal');
        const orderInfo = document.getElementById('order-info');
        
        orderInfo.innerHTML = `
            <div style="background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; width: 100%;">
                <strong>المنتج:</strong> ${productName} <br>
                <strong>المبلغ:</strong> <span style="color: #10b981;">${price}$</span>
            </div>
        `;
        modal.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('payment-modal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('payment-modal');
        if (event.target == modal) closeModal();
    }

    document.getElementById('payment-form').onsubmit = function(e) {
        e.preventDefault();
        // يمكنك تغيير الرابط هنا لرابط الواتساب الخاص بك
        window.location.href = "https://wa.me/213XXXXXXXXX";
    };
</script>

</body>
</html>
